name: apsara_2_5
description: "Apsara-2.5 (Powered by Gemini) - Created by Shubharthak"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_generative_ai: ^0.4.6
  intl: ^0.20.2
  image_picker: ^1.0.7
  path: ^1.8.3
  animated_text_kit: ^4.2.2
  file_picker: ^10.0.0
  http: ^1.2.0
  flutter_markdown: ^0.7.7
  url_launcher: ^6.2.5
  google_maps_flutter: ^2.6.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.0
  linkify: ^5.0.0
  flutter_linkify: ^6.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_highlight: ^0.7.0
  flutter_syntax_view: ^4.0.0
  flutter_html: ^3.0.0-beta.2
  flutter_math_fork: ^0.7.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  file_saver: ^0.2.9
  permission_handler: ^11.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  font_awesome_flutter: ^10.7.0
  flutter_spinkit: ^5.2.0
  vibration: ^3.1.0
  flutter_keyboard_visibility: ^6.0.0
  porcupine_flutter: ^3.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter                                                    
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

flutter_launcher_icons:
  image_path: "apsara.png"
  android: true
  ios: true
  remove_alpha_ios: true                                                                                      
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "apsara.png"

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/
    - assets/keywords/
    - assets/keywords/app-sara.ppn
    - apsara.png
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700 